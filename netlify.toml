[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/cat/*"
  to = "/.netlify/functions/cat-api/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/care"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/nutrition"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/breeds"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/rescue"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/thanks"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
