[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://cdn2.thecatapi.com https://cdn.thecatapi.com https://images.unsplash.com; connect-src 'self' https://api.thecatapi.com https://catfact.ninja; manifest-src 'self'; upgrade-insecure-requests"

[[redirects]]
  from = "/api/cat/*"
  to = "/.netlify/functions/cat-api/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/care"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/nutrition"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/breeds"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/rescue"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/thanks"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
